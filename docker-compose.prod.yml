services:
  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: always
    networks:
      - internal
      - dokploy-network
    expose:
      - "8000"
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery-worker:
    build: ./backend
    restart: always
    networks:
      - internal
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build: ./backend
    restart: always
    networks:
      - internal
    environment:
      - APP_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app beat --loglevel=info --schedule=/var/lib/celery/celerybeat-schedule
    volumes:
      - celery-beat-data:/var/lib/celery

  fetch-agent:
    build: ./fetch-agent
    restart: always
    networks:
      - internal
      - dokploy-network
    expose:
      - "8002"
    environment:
      - VOXLY_API_URL=http://backend:8000
      - VOXLY_API_KEY=${VOXLY_FETCH_API_KEY}
      - AGENT_SEED=${FETCH_AGENT_SEED}
      - AGENT_NAME=voxlyai-content-generator
      - AGENT_PORT=8002
      - AGENT_INSPECTOR=false
      - AGENT_ENDPOINT=${FETCH_AGENT_ENDPOINT}
      - AGENTVERSE_KEY=${AGENTVERSE_KEY}
    depends_on:
      backend:
        condition: service_healthy

  mcp-server:
    build: ./mcp-server
    restart: always
    networks:
      - internal
      - dokploy-network
    expose:
      - "8001"
    environment:
      - VOXLY_API_URL=http://backend:8000
      - VOXLY_API_KEY=${VOXLY_MCP_API_KEY}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    depends_on:
      backend:
        condition: service_healthy

  a2a-daemon:
    build: ./a2a-daemon
    restart: always
    networks:
      - internal
    volumes:
      - a2a-onchainos:/root/.onchainos
    depends_on:
      backend:
        condition: service_healthy

  landing:
    build: ./landing
    restart: always
    networks:
      - internal
      - dokploy-network
    expose:
      - "80"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    restart: always
    networks:
      - internal
      - dokploy-network
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - AUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
    depends_on:
      backend:
        condition: service_healthy

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  celery-beat-data:
  a2a-onchainos:
