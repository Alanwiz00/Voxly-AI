services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery-worker:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
