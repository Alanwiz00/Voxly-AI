services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  celery-worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app

  flower:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app flower --port=5555

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    environment:
      - NODE_ENV=development
      - INTERNAL_API_URL=http://backend:8000
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
