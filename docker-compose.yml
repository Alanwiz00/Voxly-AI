services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s

  celery-worker:
    build: ./backend
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app

  celery-beat:
    build: ./backend
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    volumes:
      - ./backend:/app

  flower:
    build: ./backend
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A workers.crawl_worker.celery_app flower --port=5555

  fetch-agent:
    build: ./fetch-agent
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - VOXLY_API_URL=http://backend:8000
      - VOXLY_API_KEY=${VOXLY_FETCH_API_KEY}
      - AGENT_SEED=${FETCH_AGENT_SEED}
      - AGENT_NAME=voxlyai-content-generator
      - AGENT_PORT=8002
      - AGENT_INSPECTOR=true
      - AGENT_ENDPOINT=${FETCH_AGENT_ENDPOINT:-}
      - AGENTVERSE_KEY=${AGENTVERSE_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

  mcp-server:
    build: ./mcp-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - VOXLY_API_URL=http://backend:8000
      - VOXLY_API_KEY=${VOXLY_MCP_API_KEY}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    depends_on:
      backend:
        condition: service_healthy

  beteye-agent:
    build: ./beteye-agent
    restart: unless-stopped
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      - VOXLY_API_URL=http://backend:8000
      - VOXLY_API_KEY=${BETEYE_API_KEY}
      - PERSONA_ID=${BETEYE_PERSONA_ID:-}
      - DRY_RUN=${BETEYE_DRY_RUN:-false}

      # ── Twitter / X credentials ───────────────────────────────────────────
      # App must have Read+Write permissions; tokens must be regenerated after
      # changing permissions in the Developer Portal.
      - X_API_KEY=${X_API_KEY}
      - X_API_SECRET=${X_API_SECRET}
      - X_ACCESS_TOKEN=${X_ACCESS_TOKEN}
      - X_ACCESS_TOKEN_SECRET=${X_ACCESS_TOKEN_SECRET}

      # ── Schedule knobs ────────────────────────────────────────────────────
      # DAILY_POST_MAX   — hard ceiling across all modes (default 15)
      # BREAKING_SCORE   — score threshold that bypasses the schedule (default 6)
      # STARTUP_GRACE    — minutes after start where collect_job is read-only (default 30)
      - DAILY_POST_MAX=${BETEYE_DAILY_POST_MAX:-20}
      - BREAKING_SCORE_THRESHOLD=${BETEYE_BREAKING_SCORE_THRESHOLD:-6}
      - STARTUP_GRACE_MINS=${BETEYE_STARTUP_GRACE_MINS:-30}

      # ── Collector ─────────────────────────────────────────────────────────
      - COLLECT_INTERVAL_MINS=${BETEYE_COLLECT_INTERVAL_MINS:-30}
      - MAX_CONTENT_AGE_HOURS=${BETEYE_MAX_CONTENT_AGE_HOURS:-2}
      - QUEUE_MAX_AGE_HOURS=${BETEYE_QUEUE_MAX_AGE_HOURS:-4}
      - TRANSCRIPT_MAX_CHARS=${BETEYE_TRANSCRIPT_MAX_CHARS:-2000}

      # ── Sources ───────────────────────────────────────────────────────────
      - EXTRA_NEWS_FEEDS=${BETEYE_EXTRA_NEWS_FEEDS:-}
      - EXTRA_X_ACCOUNTS=${BETEYE_EXTRA_X_ACCOUNTS:-}
      - EXTRA_YOUTUBE_CHANNELS=${BETEYE_EXTRA_YOUTUBE_CHANNELS:-}

      # ── Fixtures API ──────────────────────────────────────────────────────
      - APISPORTS_KEY=${APISPORTS_KEY:-}

      # ── Breaking-news posting (bypasses schedule) ─────────────────────────
      - POSTS_PER_RUN=${BETEYE_POSTS_PER_RUN:-1}
      - POST_INTERVAL_SECS=${BETEYE_POST_INTERVAL_SECS:-180}
      - ENABLE_REPLIES=${BETEYE_ENABLE_REPLIES:-false}
    volumes:
      - ./beteye-agent:/app
      - beteye-data:/data
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  beteye-data:
