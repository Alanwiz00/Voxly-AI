  <rect x="19" y="23" width="6" height="18" rx="3" fill="white" opacity="0.75"/>
  <rect x="28" y="15" width="8" height="34" rx="4" fill="white"/>
  <rect x="39" y="23" width="6" height="18" rx="3" fill="white" opacity="0.75"/>
  <rect x="48" y="29" width="6" height="6"  rx="3" fill="white" opacity="0.55"/>
